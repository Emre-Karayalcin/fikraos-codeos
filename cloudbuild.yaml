steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'me-central2-docker.pkg.dev/pro-fikrahub-dev/fikrahub/fikrahub:latest'
      - '.'

  # Step 2: Push image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'me-central2-docker.pkg.dev/pro-fikrahub-dev/fikrahub/fikrahub:latest'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'fikrahub'
      - '--image'
      - 'me-central2-docker.pkg.dev/pro-fikrahub-dev/fikrahub/fikrahub:latest'
      - '--region'
      - 'me-central2'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

# Build timeout
timeout: 1200s  # 20 minutes

# Build options
options:
  machineType: 'E2_HIGHCPU_8'  # Faster build with more CPU (E2 for me-central2)
  logging: CLOUD_LOGGING_ONLY
